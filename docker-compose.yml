version: "3.8"

services:
  # The PHP-FPM service (our application container)
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: recipes_app
    volumes:
      - .:/var/www
    depends_on:
      - db
    working_dir: /var/www
    networks:
      - recipes_internal
    restart: unless-stopped

  # The Nginx web server service
  nginx:
    image: nginx:stable-alpine
    container_name: recipe_nginx
    volumes:
      - .:/var/www
      - ./docker/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gateway_network
      - recipes_internal
    restart: unless-stopped

  # The MySQL database service
  db:
    image: mysql:8.0
    container_name: recipes_db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-recipes}
      MYSQL_USER: ${DB_USERNAME:-recipes_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-recipes_pass}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-recipes_pass}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    networks:
      - recipes_internal
    restart: unless-stopped

volumes:
  db-data:

networks:
  gateway_network:
    external: true
  recipes_internal:
    driver: bridge
